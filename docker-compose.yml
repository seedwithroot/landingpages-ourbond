version: '3.8'

services:
  # Development service for running Astro dev server
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ${SITE_PATH}:/app
    ports:
      - "${DEV_PORT:-4321}:4321"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development
      - DJANGO_API_URL=http://web:8000
      - DJANGO_API_KEY=${DJANGO_API_KEY}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    networks:
      - django-net

networks:
  django-net:
    external: true
    name: django-alleius_ai-net
