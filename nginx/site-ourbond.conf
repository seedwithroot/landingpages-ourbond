# OurBond
server {
    listen 80;
    listen [::]:80;
    server_name try.ourbond.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name try.ourbond.com;

    ssl_certificate /etc/letsencrypt/live/try.ourbond.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/try.ourbond.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/ourbond;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Existing hash rewrite
    rewrite ^/lw-7e48d4ef/?$ /services/merged-lone-workers-individual-pricing/ last;

    # Custom 404 handler
    error_page 404 = @handle404;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 404 handler - redirect to main ourbond.com site
    location @handle404 {
        return 302 https://ourbond.com$request_uri;
    }

    access_log /var/log/nginx/ourbond-access.log combined;
    error_log /var/log/nginx/ourbond-error.log;
}
