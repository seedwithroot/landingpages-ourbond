# Multi-tenant static site hosting with explicit domain mapping
# Add each client domain explicitly to this map

map $host $site_folder {
    default                         "";

    # OurBond
    try.ourbond.com                 ourbond;

    # SiteFuel clients
    lp-sitefuel.adalane.com         lp-sitefuel;

    # Hercules client
    hercules.adalane.com            hercules;
    intro.sitefuel.com              hercules;
    herculesstage.adalane.com       herculesstage;

    # Add more clients here:
    # client2.adalane.com           client2;
    # lp.clientdomain.com           client2;
}

# HTTP server - redirect try.ourbond.com to HTTPS, serve others normally
server {
    listen 80;
    listen [::]:80;

    # Accept any domain (will check map for valid ones)
    server_name _;

    # Redirect try.ourbond.com to HTTPS
    if ($host = try.ourbond.com) {
        return 301 https://$host$request_uri;
    }

    # Get folder from map based on domain
    set $root_path /var/www/$site_folder;

    # If domain not in map, return 404
    if ($site_folder = "") {
        return 404;
    }

    root $root_path;
    index index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Handle all routes
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {       
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging with domain name
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;
}

# HTTPS server for try.ourbond.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name try.ourbond.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/try.ourbond.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/try.ourbond.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/ourbond;
    index index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Hashed URL rewrites (obfuscated landing page URLs)
    # /lw-7e48d4ef → /services/merged-lone-workers-individual-pricing/
    rewrite ^/lw-7e48d4ef/?$ /services/merged-lone-workers-individual-pricing/ last;

    # Handle all routes
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {       
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging with domain name
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;
}
