# SiteFuel PPC Landing Pages
# Domains: lp-sitefuel.adalane.com, hello.sitefuel.com
# Location: /var/www/lp-sitefuel/

# HTTP server (redirects hello.sitefuel.com to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name lp-sitefuel.adalane.com hello.sitefuel.com;

    # Redirect hello.sitefuel.com to HTTPS
    if ($host = hello.sitefuel.com) {
        return 301 https://$host$request_uri;
    }

    root /var/www/lp-sitefuel;
    index index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;        

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json      
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # URL hash rewrites for location pages (lw-XXXXXXXX)
    # Generated by: npm run build:hashed
    # This file is deployed with the site and contains all hash mappings        
    include /var/www/lp-sitefuel/nginx-rewrites.conf;

    # Redirect root to main SiteFuel website
    location = / {
        return 301 https://www.sitefuel.com/;
    }

    # Main location block
    location / {
        # Try the exact file, then directory, then 404
        try_files $uri $uri/ =404;
    }

    # Static asset caching (1 year for immutable assets)
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|css|js|woff|woff2|ttf|eot|otf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - short cache for updates
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Hide dotfiles and sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(package\.json|package-lock\.json|tsconfig\.json|astro\.config\.mjs|\.git|\.gitignore|README\.md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent access to build artifacts that shouldn't be public
    location ~ ^/(url-map\.json|nginx-rewrites\.conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Per-site logging
    access_log /var/log/nginx/lp-sitefuel-access.log combined;
    error_log /var/log/nginx/lp-sitefuel-error.log warn;
}

# HTTPS server for hello.sitefuel.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hello.sitefuel.com;

    # SSL certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/hello.sitefuel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hello.sitefuel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/lp-sitefuel;
    index index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json      
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # URL hash rewrites for location pages (lw-XXXXXXXX)
    include /var/www/lp-sitefuel/nginx-rewrites.conf;

    # Redirect root to main SiteFuel website
    location = / {
        return 301 https://www.sitefuel.com/;
    }

    # Main location block
    location / {
        try_files $uri $uri/ =404;
    }

    # Static asset caching (1 year for immutable assets)
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|css|js|woff|woff2|ttf|eot|otf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - short cache for updates
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Hide dotfiles and sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(package\.json|package-lock\.json|tsconfig\.json|astro\.config\.mjs|\.git|\.gitignore|README\.md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent access to build artifacts
    location ~ ^/(url-map\.json|nginx-rewrites\.conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Per-site logging
    access_log /var/log/nginx/lp-sitefuel-access.log combined;
    error_log /var/log/nginx/lp-sitefuel-error.log warn;
}
