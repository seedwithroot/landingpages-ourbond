# Multi-tenant static site hosting with explicit domain mapping
# Add each client domain explicitly to this map

map $host $site_folder {
    default                         "";
    
    # SiteFuel clients
    lp-sitefuel.adalane.com         lp-sitefuel;
    
    # Hercules client
    hercules.adalane.com            hercules;
    intro.sitefuel.com              hercules;
    herculesstage.adalane.com       herculesstage;
    
    # Add more clients here:
    # client2.adalane.com           client2;
    # lp.clientdomain.com           client2;
}

server {
    listen 80;
    listen [::]:80;
    
    # Accept any domain (will check map for valid ones)
    server_name _;
    
    # Get folder from map based on domain
    set $root_path /var/www/$site_folder;
    
    # If domain not in map, return 404
    if ($site_folder = "") {
        return 404;
    }
    
    root $root_path;
    index index.html index.htm;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Handle all routes
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging with domain name
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;
}
